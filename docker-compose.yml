services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ai_platform_control
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-logs:/var/log/postgresql
    networks: [private]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ai_platform_control']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
      - redis-logs:/var/log/redis
    networks: [private]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  control-plane-api:
    build:
      context: .
      dockerfile: control-plane-api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_platform_control
      CONTROL_PLANE_API_HOST: 0.0.0.0
      CONTROL_PLANE_API_PORT: 4100
      CONTROL_PLANE_API_TOKEN: local-control-plane-token
      CONTROL_PLANE_ALLOWED_ORIGIN: http://localhost:3000
      CONTROL_PLANE_STATE_FILE: /app/.data/control-plane-state.json
      REDIS_URL: redis://redis:6379/0
    ports:
      - '4100:4100'
    volumes:
      - control-plane-state:/app/.data
      - platform-object-storage:/var/lib/ai-platform/object-storage
      - control-plane-logs:/var/log/ai-platform/control-plane-api
    networks: [private]
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4100/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      control-plane-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      SESSION_SECRET: local-dev-session-secret-change-me-1234567890
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_platform_control
      AUTH_STATE_FILE: /app/.data/dashboard-auth.json
      ADMIN_CATALOG_STATE_FILE: /app/.data/dashboard-admin-catalog.json
      CONTROL_PLANE_STATE_FILE: /app/.data/control-plane-state.json
      CONTROL_PLANE_API_BASE_URL: http://control-plane-api:4100
      NEXT_PUBLIC_CONTROL_PLANE_API_BASE_URL: http://localhost:4100
      CONTROL_PLANE_API_TOKEN: local-control-plane-token
      ADMIN_MFA_TEST_CODE: '000000'
      REDIS_URL: redis://redis:6379/0
    ports:
      - '3000:3000'
    volumes:
      - dashboard-state:/app/.data
      - dashboard-logs:/var/log/ai-platform/dashboard
    networks: [private]
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    profiles: ['edge']
    depends_on:
      dashboard:
        condition: service_healthy
      control-plane-api:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ops/nginx/certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx
    networks: [edge, private]
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  postgres-logs:
  redis-data:
  redis-logs:
  control-plane-state:
  dashboard-state:
  platform-object-storage:
  control-plane-logs:
  dashboard-logs:
  nginx-logs:

networks:
  edge:
  private:
    internal: true
