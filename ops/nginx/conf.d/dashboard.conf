upstream dashboard_upstream {
  server dashboard:3000;
}

upstream control_plane_upstream {
  server control-plane-api:4100;
}

server {
  listen 80;
  server_name _;

  location = /healthz {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name _;

  ssl_certificate /etc/nginx/certs/tls.crt;
  ssl_certificate_key /etc/nginx/certs/tls.key;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;

  location /api/control-plane/ {
    rewrite ^/api/control-plane/?(.*)$ /$1 break;
    proxy_pass http://control_plane_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://dashboard_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}